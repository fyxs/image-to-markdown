<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能测试页面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>图片处理性能测试</h1>
    
    <div class="test-section">
        <h2>1. 图片上传性能测试</h2>
        <input type="file" id="test-file" accept="image/*">
        <button onclick="testUploadPerformance()">开始测试</button>
        <div id="upload-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 图片压缩性能测试</h2>
        <input type="file" id="compress-file" accept="image/*">
        <button onclick="testCompressionPerformance()">开始测试</button>
        <div id="compress-result" class="result"></div>
    </div>
    
    <script>
        // 测试上传性能
        function testUploadPerformance() {
            const fileInput = document.getElementById('test-file');
            const resultDiv = document.getElementById('upload-result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '请选择一个文件';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '测试中...';
            
            const startTime = performance.now();
            
            // 测试 FileReader 方式
            const reader = new FileReader();
            reader.onload = function() {
                const readerTime = performance.now() - startTime;
                
                // 测试 createObjectURL 方式
                const urlStartTime = performance.now();
                const objectUrl = URL.createObjectURL(file);
                
                const img = new Image();
                img.onload = function() {
                    URL.revokeObjectURL(objectUrl);
                    const objectUrlTime = performance.now() - urlStartTime;
                    
                    resultDiv.innerHTML = `
                        <strong>文件信息:</strong><br>
                        文件名: ${file.name}<br>
                        文件大小: ${(file.size / 1024 / 1024).toFixed(2)} MB<br>
                        文件类型: ${file.type}<br><br>
                        
                        <strong>性能结果:</strong><br>
                        FileReader 方式: ${readerTime.toFixed(2)} ms<br>
                        createObjectURL 方式: ${objectUrlTime.toFixed(2)} ms<br>
                        性能提升: ${((readerTime - objectUrlTime) / readerTime * 100).toFixed(1)}%
                    `;
                };
                img.src = objectUrl;
            };
            reader.readAsDataURL(file);
        }
        
        // 测试压缩性能
        function testCompressionPerformance() {
            const fileInput = document.getElementById('compress-file');
            const resultDiv = document.getElementById('compress-result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '请选择一个文件';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '测试中...';
            
            if (file.size < 1024 * 1024) {
                resultDiv.innerHTML = '请选择大于1MB的文件进行压缩测试';
                return;
            }
            
            const startTime = performance.now();
            
            compressImage(file, function(compressedFile) {
                const endTime = performance.now();
                const compressionTime = endTime - startTime;
                const compressionRatio = (1 - compressedFile.size / file.size) * 100;
                
                resultDiv.innerHTML = `
                    <strong>原始文件信息:</strong><br>
                    文件名: ${file.name}<br>
                    文件大小: ${(file.size / 1024 / 1024).toFixed(2)} MB<br><br>
                    
                    <strong>压缩后文件信息:</strong><br>
                    文件大小: ${(compressedFile.size / 1024 / 1024).toFixed(2)} MB<br>
                    压缩率: ${compressionRatio.toFixed(1)}%<br>
                    压缩耗时: ${compressionTime.toFixed(2)} ms
                `;
            });
        }
        
        // 压缩图片函数（与主应用相同）
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    // 计算压缩后的尺寸
                    let width = img.width;
                    let height = img.height;
                    const maxDimension = 1920;
                    
                    if (width > height && width > maxDimension) {
                        height = Math.round((height * maxDimension) / width);
                        width = maxDimension;
                    } else if (height > maxDimension) {
                        width = Math.round((width * maxDimension) / height);
                        height = maxDimension;
                    }
                    
                    // 创建canvas进行压缩
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 根据文件大小决定压缩质量
                    let quality = 0.8;
                    if (file.size > 5 * 1024 * 1024) {
                        quality = 0.6;
                    } else if (file.size > 2 * 1024 * 1024) {
                        quality = 0.7;
                    }
                    
                    // 转换为Blob
                    canvas.toBlob(function(blob) {
                        const compressedFile = new File([blob], file.name, {
                            type: file.type,
                            lastModified: Date.now()
                        });
                        callback(compressedFile);
                    }, file.type, quality);
                };
            };
        }
    </script>
</body>
</html>
