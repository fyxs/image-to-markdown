<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR优化效果测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .comparison div {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .before {
            background-color: #ffeaa7;
        }
        .after {
            background-color: #a29bfe;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>OCR识别优化效果测试</h1>
    
    <div class="test-section">
        <h2>表格图片识别测试</h2>
        <p>请上传类似企业微信截图的表格图片进行测试</p>
        <input type="file" id="table-file" accept="image/*">
        <button onclick="testTableRecognition()">开始测试</button>
        <div id="table-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>图像预处理效果对比</h2>
        <p>查看图像预处理前后的效果对比</p>
        <input type="file" id="preprocess-file" accept="image/*">
        <button onclick="showPreprocessComparison()">显示对比</button>
        <div id="preprocess-result" class="result"></div>
    </div>
    
    <script>
        // 图像预处理函数（与主应用相同）
        function enhanceImageForOCR(ctx, width, height) {
            // 获取图像数据
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            // 1. 灰度转换
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                data[i] = avg;     // R
                data[i + 1] = avg; // G
                data[i + 2] = avg; // B
            }
            
            // 2. 对比度增强
            const contrastFactor = 1.2;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.min(255, Math.max(0, (data[i] - 128) * contrastFactor + 128));
                data[i + 1] = data[i];
                data[i + 2] = data[i];
            }
            
            // 3. 二值化处理
            const threshold = 180;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i];
                const binary = gray > threshold ? 255 : 0;
                data[i] = binary;
                data[i + 1] = binary;
                data[i + 2] = binary;
            }
            
            // 将处理后的数据放回canvas
            ctx.putImageData(imageData, 0, 0);
            
            // 4. 锐化处理
            ctx.filter = 'sharpen(0.5)';
            ctx.drawImage(ctx.canvas, 0, 0, width, height, 0, 0, width, height);
        }
        
        // 测试表格识别
        function testTableRecognition() {
            const fileInput = document.getElementById('table-file');
            const resultDiv = document.getElementById('table-result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '请选择一个文件';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '测试中...';
            
            // 创建预览
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 创建两个canvas，一个用于原始图像，一个用于处理后的图像
                    const originalCanvas = document.createElement('canvas');
                    const processedCanvas = document.createElement('canvas');
                    
                    const width = Math.min(img.width, 800);
                    const height = (img.height * width) / img.width;
                    
                    originalCanvas.width = width;
                    originalCanvas.height = height;
                    processedCanvas.width = width;
                    processedCanvas.height = height;
                    
                    const originalCtx = originalCanvas.getContext('2d');
                    const processedCtx = processedCanvas.getContext('2d');
                    
                    // 绘制原始图像
                    originalCtx.drawImage(img, 0, 0, width, height);
                    
                    // 绘制并处理图像
                    processedCtx.drawImage(img, 0, 0, width, height);
                    enhanceImageForOCR(processedCtx, width, height);
                    
                    // 显示对比
                    resultDiv.innerHTML = `
                        <h3>预处理效果对比</h3>
                        <div class="comparison">
                            <div class="before">
                                <h4>原始图像</h4>
                                <img src="${originalCanvas.toDataURL()}" style="max-width: 100%;">
                            </div>
                            <div class="after">
                                <h4>预处理后</h4>
                                <img src="${processedCanvas.toDataURL()}" style="max-width: 100%;">
                            </div>
                        </div>
                        <p class="mt-4">预处理后的图像应该具有更好的对比度和清晰度，有助于提高OCR识别准确率。</p>
                    `;
                    
                    // 提示用户使用主应用测试
                    resultDiv.innerHTML += `
                        <div class="mt-4 p-4 bg-blue-100 rounded-lg">
                            <h4>测试建议</h4>
                            <p>请将此图片上传到主应用中测试OCR识别效果。优化后的版本应该能够：</p>
                            <ul>
                                <li>更准确地识别表格结构</li>
                                <li>正确提取表格中的文字内容</li>
                                <li>生成格式正确的Markdown表格</li>
                            </ul>
                        </div>
                    `;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // 显示预处理对比
        function showPreprocessComparison() {
            const fileInput = document.getElementById('preprocess-file');
            const resultDiv = document.getElementById('preprocess-result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '请选择一个文件';
                return;
            }
            
            const file = fileInput.files[0];
            resultDiv.innerHTML = '处理中...';
            
            // 创建预览
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 调整尺寸
                    const width = Math.min(img.width, 600);
                    const height = (img.height * width) / img.width;
                    
                    // 创建处理步骤的canvas
                    const steps = [
                        { name: '原始图像', canvas: document.createElement('canvas') },
                        { name: '灰度转换', canvas: document.createElement('canvas') },
                        { name: '对比度增强', canvas: document.createElement('canvas') },
                        { name: '二值化处理', canvas: document.createElement('canvas') },
                        { name: '锐化增强', canvas: document.createElement('canvas') }
                    ];
                    
                    steps.forEach(step => {
                        step.canvas.width = width;
                        step.canvas.height = height;
                    });
                    
                    // 绘制原始图像
                    const originalCtx = steps[0].canvas.getContext('2d');
                    originalCtx.drawImage(img, 0, 0, width, height);
                    
                    // 步骤1：灰度转换
                    const grayCtx = steps[1].canvas.getContext('2d');
                    grayCtx.drawImage(img, 0, 0, width, height);
                    const grayData = grayCtx.getImageData(0, 0, width, height);
                    const grayPixels = grayData.data;
                    
                    for (let i = 0; i < grayPixels.length; i += 4) {
                        const avg = (grayPixels[i] + grayPixels[i + 1] + grayPixels[i + 2]) / 3;
                        grayPixels[i] = avg;
                        grayPixels[i + 1] = avg;
                        grayPixels[i + 2] = avg;
                    }
                    grayCtx.putImageData(grayData, 0, 0);
                    
                    // 步骤2：对比度增强
                    const contrastCtx = steps[2].canvas.getContext('2d');
                    contrastCtx.putImageData(grayData, 0, 0);
                    const contrastData = contrastCtx.getImageData(0, 0, width, height);
                    const contrastPixels = contrastData.data;
                    
                    const contrastFactor = 1.2;
                    for (let i = 0; i < contrastPixels.length; i += 4) {
                        contrastPixels[i] = Math.min(255, Math.max(0, (contrastPixels[i] - 128) * contrastFactor + 128));
                        contrastPixels[i + 1] = contrastPixels[i];
                        contrastPixels[i + 2] = contrastPixels[i];
                    }
                    contrastCtx.putImageData(contrastData, 0, 0);
                    
                    // 步骤3：二值化处理
                    const binaryCtx = steps[3].canvas.getContext('2d');
                    binaryCtx.putImageData(contrastData, 0, 0);
                    const binaryData = binaryCtx.getImageData(0, 0, width, height);
                    const binaryPixels = binaryData.data;
                    
                    const threshold = 180;
                    for (let i = 0; i < binaryPixels.length; i += 4) {
                        const gray = binaryPixels[i];
                        const binary = gray > threshold ? 255 : 0;
                        binaryPixels[i] = binary;
                        binaryPixels[i + 1] = binary;
                        binaryPixels[i + 2] = binary;
                    }
                    binaryCtx.putImageData(binaryData, 0, 0);
                    
                    // 步骤4：锐化处理
                    const sharpenCtx = steps[4].canvas.getContext('2d');
                    sharpenCtx.putImageData(binaryData, 0, 0);
                    sharpenCtx.filter = 'sharpen(0.5)';
                    sharpenCtx.drawImage(sharpenCtx.canvas, 0, 0, width, height, 0, 0, width, height);
                    
                    // 显示处理步骤
                    let html = '<h3>预处理步骤效果</h3><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px;">';
                    
                    steps.forEach(step => {
                        html += `
                            <div style="border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
                                <h4>${step.name}</h4>
                                <img src="${step.canvas.toDataURL()}" style="max-width: 100%;">
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    resultDiv.innerHTML = html;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
